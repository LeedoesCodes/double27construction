# Render Blueprint — free staging deploy for the Double 27 demo site.
# In Render: New +  ->  Blueprint  ->  connect this repo. It reads this file.
services:
  - type: web
    name: double27-demo
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      # APP_KEY is generated by the container entrypoint (php artisan key:generate)
      # so it has the correct base64: format Laravel requires.
      - key: LOG_CHANNEL
        value: stderr
